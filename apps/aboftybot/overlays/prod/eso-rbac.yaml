apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-kubernetes-provider
  namespace: aboftybot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-read-secrets
  namespace: secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-read-secrets
  namespace: secrets
subjects:
  - kind: ServiceAccount
    name: eso-kubernetes-provider
    namespace: aboftybot
roleRef:
  kind: Role
  name: eso-read-secrets
  apiGroup: rbac.authorization.k8s.io