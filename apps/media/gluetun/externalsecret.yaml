apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gluetun-secret
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: gluetun-secret
    creationPolicy: Owner

  # Mullvad WireGuard credentials, stored in the 1Password "mullvad" item.
  # The onepasswordSDK provider requires full op://<vault>/<item>/<field>
  # references. secretKey controls the resulting env-var name (consumed by the
  # gluetun container via envFrom), so the 1Password field labels can stay
  # lowercase-dashed.
  dataFrom:
    - extract:
        key: mullvad