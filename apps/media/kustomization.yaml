apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media

resources:
  - namespace.yaml
  - media-pvc.yaml
  - middleware.yaml
  - networkpolicies.yaml

  # Gluetun VPN credentials (shares qBittorrent's pod)
  - gluetun/externalsecret.yaml

  # qBittorrent + Prowlarr (run in the same pod as Gluetun, behind the VPN)
  - qbittorrent/externalsecret.yaml
  - qbittorrent/pvc.yaml
  - qbittorrent/deployment.yaml
  - qbittorrent/service.yaml
  - qbittorrent/ingress.yaml

  # Prowlarr (deployment lives in qbittorrent/deployment.yaml alongside Gluetun)
  - prowlarr/externalsecret.yaml
  - prowlarr/pvc.yaml
  - prowlarr/service.yaml
  - prowlarr/ingress.yaml

  # Radarr
  - radarr/externalsecret.yaml
  - radarr/pvc.yaml
  - radarr/deployment.yaml
  - radarr/service.yaml
  - radarr/ingress.yaml

  # Sonarr
  - sonarr/externalsecret.yaml
  - sonarr/pvc.yaml
  - sonarr/deployment.yaml
  - sonarr/service.yaml
  - sonarr/ingress.yaml

generatorOptions:
  disableNameSuffixHash: true
