apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prowlarr-secret
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: prowlarr-secret
    creationPolicy: Owner

  # Prowlarr generates and stores its API key on the /config PVC. This secret
  # exists so the API key (and any future credentials) can be sourced from
  # 1Password instead of Git. Indexer/tracker secrets are NEVER stored here or
  # in Git -- they stay in Prowlarr's PVC-backed runtime config.
  dataFrom:
    - extract:
        key: prowlarr
