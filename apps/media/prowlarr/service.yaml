---
# Prowlarr runs inside the qBittorrent/Gluetun pod (shared VPN netns), so this
# Service selects app: qbittorrent and targets Prowlarr's port 9696.
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  labels:
    app: prowlarr
spec:
  selector:
    app: qbittorrent
  ports:
    - protocol: TCP
      port: 9696
      targetPort: 9696
