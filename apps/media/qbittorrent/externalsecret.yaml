apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-secret
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: qbittorrent-secret
    creationPolicy: Owner

  # Pulls whatever fields exist in the 1Password "qbittorrent" item
  # (e.g. username / password). qBittorrent persists its own credentials on the
  # /config PVC, so this secret is available for reference but not injected as
  # env by default.
  dataFrom:
    - extract:
        key: qbittorrent
