---
# Only the Web UI is exposed. Torrent listen ports are intentionally NOT
# published through a Service; peer traffic stays inside the Gluetun tunnel.
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  labels:
    app: qbittorrent
spec:
  selector:
    app: qbittorrent
  ports:
    - name: webui
      protocol: TCP
      port: 8080
      targetPort: 8080
