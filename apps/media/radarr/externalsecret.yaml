apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr-secret
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: radarr-secret
    creationPolicy: Owner

  # Radarr generates its API key on the /config PVC. This secret makes that key
  # available from 1Password for any future GitOps wiring (e.g. cross-app
  # automation). API keys are never committed to Git.
  dataFrom:
    - extract:
        key: radarr
