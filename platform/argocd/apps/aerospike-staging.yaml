apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aerospike-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/aboft/homelab-gitops.git
    targetRevision: main
    path: apps/aerospike/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: asdb-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true