apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-kps
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.1.1
      helm:
        releaseName: kps
        valueFiles:
          - $values/platform/observability/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/aboft/homelab-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
