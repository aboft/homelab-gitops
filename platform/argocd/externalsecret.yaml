apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: admin.password
      remoteRef:
        key: ArgoCD
        property: admin_password_bcrypt
    - secretKey: admin.passwordMtime
      remoteRef:
        key: ArgoCD
        property: admin_password_mtime