server:
  extraArgs:
    - --insecure

configs:
  params:
    server.insecure: true

controller:
  replicas: 1

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

redis:
  enabled: true

  secretInit:
    enabled: false

  existingSecret: argocd-redis
  existingSecretPasswordKey: auth

notifications:
  enabled: true