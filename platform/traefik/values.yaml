deployment:
  replicas: 3

service:
  enabled: true
  single: true
  type: LoadBalancer
  spec:
    loadBalancerIP: 192.168.88.10

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

providers:
  kubernetesIngress:
    enabled: true
    ingressClass: traefik
    publishedService:
      enabled: true

  kubernetesCRD:
    enabled: true

ports:
  web:
    expose:
      default: true
    exposedPort: 80

  websecure:
    expose:
      default: true
    exposedPort: 443

logs:
  general:
    level: INFO
  access:
    enabled: true

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: traefik